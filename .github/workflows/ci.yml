name: CI

on:
  push:
    branches: [main, framework-core]
  pull_request:

# Deny warnings in our own crates (registry dependencies are cap-lints=allow,
# so this only gates first-party code).
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  python:
    name: python sdk + interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SDK + test deps
        run: python -m pip install -r sdk/py/requirements-dev.txt
      - name: Build interop server examples
        run: cargo build --workspace --examples
      - name: Conformance + interop (under coverage)
        run: |
          cd sdk/py
          PYTHONPATH=. python -m coverage run --branch -m unittest discover -s tests -v
      - name: Coverage report + floor
        run: |
          cd sdk/py
          python -m coverage report -m \
            --include="*/thicket/*,*/fibers/py/*,*/weaves/py/*,*/apps/py/*" \
            --fail-under=85
